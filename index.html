<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coba kamu liat 😁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Inter:wght@400;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            /* GANTI BACKGROUND JADI FOTO SHIROKO12 */
            background: url('shiroko12.jpg') no-repeat center fixed;
            background-size: cover;
            overflow: hidden;
        }

       .font-question {
            font-family: 'Gochi Hand', cursive;
        }

        #no-button {
            position: absolute;
            transition: all 0.3s ease-in-out;
            z-index: 10;
        }

        #yes-button {
            position: relative;
            z-index: 20;
        }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-4">

    <div id="main-content" class="bg-gray-900 bg-opacity-70 backdrop-blur-lg p-8 md:p-12 rounded-2xl shadow-2xl text-center max-w-lg w-full">
        <!-- GANTI GIF JADI FOTO SHIROKO -->
        <img src="Sunaookami%20Shiroko.jpg"
             alt="Foto Ilaa"
             class="w-48 h-48 mx-auto rounded-full mb-6 shadow-lg border-4 border-pink-400 object-cover">

        <h1 class="font-question text-4xl md:text-5xl font-bold text-pink-400 mb-6">
            Heeey Ila...
        </h1>
        <p class="text-2xl md:text-3xl mb-10 font-question text-gray-200">
            Aku punya pertanyaan... tapi jangan gedek" ya🥹
        </p>

        <p class="text-xl md:text-2xl mb-10 font-semibold text-white">
            Maukah kamu jadi MBG 🥺👉👈
        </p>

        <div class="relative flex-col sm:flex-row justify-center items-center gap-4 h-24">
            <button id="yes-button"
                    class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-lg text-lg hover:scale-110 shadow-lg">
                SANGAT MAU!
            </button>

            <button id="no-button"
                    class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-8 rounded-lg text-lg shadow-lg"
                    style="left: 55%; transform: translateX(-50%);">
                TIDAK.
            </button>
        </div>
    </div>

    <div id="success-message"
         class="hidden bg-gray-900 bg-opacity-70 backdrop-blur-lg p-8 md:p-12 rounded-2xl shadow-2xl text-center max-w-lg w-full">
        <img src="Sunaookami%20Shiroko.jpg"
             alt="Foto Ilaa senyum"
             class="w-48 h-48 mx-auto rounded-full mb-6 shadow-lg border-4 border-green-400 object-cover">

        <h1 class="font-question text-5xl md:text-6xl font-bold text-green-400 mb-6">
            YAAAAAY!
        </h1>
        <p class="text-2xl md:text-3xl font-question text-gray-200 mb-8">
            Aku paling bahagia kalau sama kamu Ilaa! 🖤
        </p>
        <p class="text-lg text-gray-300">
            (Screenshot ini terus kirim ke aku yaa 😆)
        </p>
    </div>

    <script>
        const yesButton = document.getElementById('yes-button');
        const noButton = document.getElementById('no-button');
        const mainContent = document.getElementById('main-content');
        const successMessage = document.getElementById('success-message');

        const noButtonTexts = [
            "Nggak mau? :(",
            "Yakin nih Ilaaa?",
            "Please dong 🥺",
            "Ayo mauu",
            "Gak bisa nolak!",
            "Klik yang ijo ajaa",
            "Jangan gitu dong",
            "Traktir gorengan ya",
            "HMMMM ILAA"
        ];

        let yesButtonScale = 1;
        let noButtonTextIndex = 0;

        yesButton.addEventListener('click', () => {
            mainContent.classList.add('scale-0', 'opacity-0');
            setTimeout(() => {
                mainContent.classList.add('hidden');
                successMessage.classList.remove('hidden', 'scale-0', 'opacity-0');
                successMessage.classList.add('scale-100', 'opacity-100');
            }, 500);
        });

        function moveButton() {
            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;
            const buttonWidth = noButton.offsetWidth;
            const buttonHeight = noButton.offsetHeight;

            let newX = Math.random() * (viewportWidth - buttonWidth - (viewportWidth * 0.1));
            let newY = Math.random() * (viewportHeight - buttonHeight - (viewportHeight * 0.1));

            newX += (viewportWidth * 0.05);
            newY += (viewportHeight * 0.05);

            noButton.style.position = 'fixed';
            noButton.style.left = `${newX}px`;
            noButton.style.top = `${newY}px`;

            yesButtonScale += 0.2;
            yesButton.style.transform = `scale(${yesButtonScale})`;

            noButtonTextIndex = (noButtonTextIndex + 1) % noButtonTexts.length;
            noButton.innerText = noButtonTexts[noButtonTextIndex];
        }

        noButton.addEventListener('mouseover', moveButton);
        noButton.addEventListener('click', moveButton);
    </script>
</body>
</html>
