<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untuk Kamu Sayang 💖</title>
  <style>
    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #fff1f2, #ffe4e6, #fecdd3);
      color: #831843;
      margin: 0;
      padding: 0;
      text-align: center;
      min-height: 100vh;
    }
    .container {
      max-width: 550px;
      margin: 0 auto;
      padding: 60px 20px;
    }
    .photo {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 5px solid #f43f5e;
      object-fit: cover;
      box-shadow: 0 10px 30px rgba(244,63,94,0.3);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    h1 {
      font-size: 2.8em;
      color: #e11d48;
      margin: 30px 0 10px;
      animation: heart 2s infinite;
    }
    @keyframes heart {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .card {
      background: rgba(255,255,255,0.9);
      border-radius: 30px;
      padding: 35px;
      margin-top: 30px;
      backdrop-filter: blur(10px);
      box-shadow: 0 15px 50px rgba(0,0,0,0.1);
    }
    p {
      font-size: 1.15em;
      line-height: 2;
      margin: 15px 0;
    }
    .btn {
      background: linear-gradient(135deg, #f43f5e, #e11d48);
      color: white;
      padding: 16px 35px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
      margin-top: 25px;
      font-size: 1.1em;
      box-shadow: 0 8px 25px rgba(244,63,94,0.4);
      transition: 0.3s;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(244,63,94,0.5);
    }
    audio {
      margin-top: 20px;
      border-radius: 30px;
      width: 100%;
      max-width: 300px;
    }
    .hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }
    .heart {
      position: absolute;
      color: #fda4af;
      font-size: 20px;
      animation: fall 5s linear infinite;
    }
    @keyframes fall {
      0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="hearts" id="hearts"></div>
  
  <div class="container">
    <img src="https://i.pravatar.cc/180?u=pacarku" alt="Foto Kamu" class="photo">
    
    <h1>Untuk [Zyn] 💕</h1>
    
    <div class="card">
      <p>Setiap hari bareng kamu itu anugerah terindah ✨</p>
      <p>Senengnya aku gak bisa diungkapin pake kata-kata</p>
      <p>Kamu bikin dunia aku jadi lebih indah dari sebelumnya</p>
      <p>Terima kasih udah mau bertahan sama aku ya sayang 🥺</p>
      <p style="font-weight: bold; font-size: 1.3em;">I love you to the moon and back 🌙❤️</p>
      
      <audio controls autoplay loop>
      <source src="https://cdn.anonfiles.com/L1k7B4d8h3/Vierra%20-%20Rahasia.mp3"  type="audio">
      <p style="font-size: 0.9em; opacity: 0.7;">*lagu kenyamanan kita</p>
      
      <a href="https://wa.me/6283141292575" class="btn">💬 Peluk aku  Disini</a>
    </div>
    
    <p style="margin-top: 40px; font-style: italic;">
      Dibuat pake Termux + cinta dari [Ryxz] 💌
    </p>
  </div>
  
  <script>
    // Bikin hujan hati jatuh
    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '❤️';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = Math.random() * 3 + 3 + 's';
      document.getElementById('hearts').appendChild(heart);
      setTimeout(() => heart.remove(), 5000);
    }
    setInterval(createHeart, 300);
  </script>
</body>
</html>
